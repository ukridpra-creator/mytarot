<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เสียงกระซิบจากปีศาจ — My Tarot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { padding-bottom: 60px; background: #0a0008; }
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid rgba(139,0,139,0.3);
      background: rgba(10,0,8,0.95); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(139,0,139,0.2); border: 1px solid rgba(139,0,139,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #c084fc;
      font-size: 16px; text-decoration: none; flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; color: white; }
    .page-content { padding: 20px 20px 40px; }
    .hero { text-align: center; padding: 12px 0 20px; }
    .hero-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
    .hero-desc { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.7; }

    /* Slot */
    .slot-section { margin-bottom: 20px; }
    .slot-title { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 12px; }
    .slot-center { display: flex; justify-content: center; }
    .slot {
      width: 100px; aspect-ratio: 2/3;
      background: rgba(139,0,139,0.08);
      border: 2px dashed rgba(139,0,139,0.4);
      border-radius: 12px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .slot.filled { border: 2px solid rgba(139,0,139,0.6); padding: 0; overflow: hidden; }
    .slot-img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .slot-num { font-size: 12px; color: rgba(255,255,255,0.3); }
    .slot-label { font-size: 11px; color: #c084fc; }

    /* Cards fan */
    .cards-section { margin-bottom: 24px; }
    .cards-title { font-size: 13px; color: #c084fc; font-weight: 700; margin-bottom: 12px; text-align: center; }
    .cards-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; }
    .cards-scroll::-webkit-scrollbar { height: 3px; }
    .cards-scroll::-webkit-scrollbar-thumb { background: rgba(139,0,139,0.4); border-radius: 2px; }
    .card-item {
      width: 52px; aspect-ratio: 2/3; flex-shrink: 0;
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; border: 2px solid transparent;
    }
    .card-item:hover { transform: translateY(-6px); border-color: #c084fc; }
    .card-item.selected { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    .card-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Reveal overlay */
    .reveal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.95); display: none;
      flex-direction: column; align-items: center; justify-content: center; padding: 16px;
    }
    .reveal-overlay.show { display: flex; }
    .reveal-title { font-size: 16px; color: #c084fc; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .reveal-card-wrap {
      width: 160px; aspect-ratio: 2/3; border-radius: 16px; overflow: hidden;
      border: 2px solid rgba(139,0,139,0.5); perspective: 600px;
      margin-bottom: 20px;
    }
    .reveal-card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform 0.8s ease;
    }
    .reveal-card-inner.flipped { transform: rotateY(180deg); }
    .reveal-card-front, .reveal-card-back {
      position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px; overflow: hidden;
    }
    .reveal-card-back { transform: rotateY(0deg); }
    .reveal-card-front { transform: rotateY(180deg); }
    .reveal-card-front img, .reveal-card-back img { width: 100%; height: 100%; object-fit: cover; }
    .reveal-name { font-size: 18px; color: white; font-weight: 800; letter-spacing: 2px; margin-bottom: 4px; opacity: 0; transition: opacity 0.3s; }
    .reveal-name.show { opacity: 1; }
    .btn-accept {
      background: linear-gradient(135deg, #6b21a8, #4a044e);
      border: none; border-radius: 16px; padding: 14px 32px;
      color: white; font-size: 15px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
      margin-top: 16px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
      box-shadow: 0 4px 20px rgba(107,33,168,0.4);
    }
    .btn-accept.show { opacity: 1; pointer-events: all; }

    /* Result */
    .result-box { display: none; }
    .result-box.show { display: block; }
    .result-card-big {
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(139,0,139,0.4);
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(139,0,139,0.2);
      max-width: 240px; margin-left: auto; margin-right: auto;
    }
    .result-card-big img { width: 100%; display: block; }
    .result-name {
      text-align: center; padding: 14px;
      background: rgba(20,0,20,0.8);
      font-size: 20px; font-weight: 800;
      color: #c084fc; letter-spacing: 2px;
      border-top: 1px solid rgba(139,0,139,0.3);
    }
    .warning-box {
      background: rgba(139,0,139,0.08);
      border: 1px solid rgba(139,0,139,0.25);
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    .warning-label {
      font-size: 11px; letter-spacing: 2px; color: #c084fc;
      font-weight: 700; margin-bottom: 10px; text-transform: uppercase;
    }
    .warning-title { font-size: 17px; font-weight: 700; color: white; margin-bottom: 12px; }
    .warning-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.9; }
    .tagline { text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); margin: 16px 0 24px; font-style: italic; }

    /* Share section */
    .share-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px; margin-bottom: 20px;
    }
    .share-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 16px; text-align: center; }
    .share-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .share-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 12px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'Sarabun', sans-serif; transition: all 0.2s;
    }
    .share-btn:hover { transform: translateY(-2px); }
    .share-btn.tt { background: #000; color: white; border: 1px solid #333; }
    .share-btn.ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; }
    .share-btn.fb { background: #1877f2; color: white; }
    .share-btn.save { background: rgba(139,0,139,0.2); color: #c084fc; border: 1px solid rgba(139,0,139,0.4); }

    /* Hidden canvas */
    #shareCanvas { display: none; }
  </style>
</head>
<body>

<div class="page-header">
  <a href="oracle.html" class="back-btn">←</a>
  <div class="page-title">🖤 เสียงกระซิบจากปีศาจ</div>
  <div style="margin-left:auto" class="coin-badge">🪙 <span id="coinCount">500</span></div>
</div>

<!-- Reveal overlay -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-title">🖤 เสียงกระซิบจากปีศาจ...</div>
  <div class="reveal-card-wrap">
    <div class="reveal-card-inner" id="revealInner">
      <div class="reveal-card-back"><img src="../images/demon/backdemon.png"></div>
      <div class="reveal-card-front"><img id="revealFrontImg" src=""></div>
    </div>
  </div>
  <div class="reveal-name" id="revealName"></div>
  <button class="btn-accept" id="btnAccept" onclick="acceptReading()">🖤 รับคำเตือน</button>
</div>

<div class="page-content">
  <div class="hero">
    <div class="hero-title">🖤 Whisper of Demon</div>
    <div class="hero-desc">เปิดไพ่เพื่อรับคำเตือนจากเงามืด<br>ได้เพียงวันละ 1 ครั้งเท่านั้น</div>
  </div>

  <!-- Slot -->
  <div class="slot-section">
    <div class="slot-title">✦ ไพ่ที่เลือก</div>
    <div class="slot-center">
      <div class="slot" id="slot0">
        <div class="slot-num">🖤</div>
        <div class="slot-label">เลือก 1 ใบ</div>
      </div>
    </div>
  </div>

  <!-- Cards fan -->
  <div class="cards-section">
    <div class="cards-title">🖤 ตั้งจิต แล้วเลือกไพ่ 1 ใบ</div>
    <div class="cards-scroll" id="cardsScroll"></div>
    <div style="text-align:center;font-size:11px;color:rgba(255,255,255,0.2);margin-top:6px">← เลื่อนซ้ายขวาเพื่อดูไพ่ทั้งหมด →</div>
  </div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-card-big">
      <img id="resultImg" src="" alt="">
      <div class="result-name" id="resultName"></div>
    </div>
    <div class="warning-box">

      <div class="warning-title" id="resultWarning"></div>
      <div class="warning-text" id="resultMessage"></div>
    </div>
    <div class="tagline">จงฟังเสียงเตือนนี้ไว้ในใจ...</div>

    <!-- Share -->
    <div class="share-section">
      <div class="share-title">📤 แชร์ไพ่ของคุณ</div>
      <div class="share-btns">
        <button class="share-btn tt" onclick="shareCard('tt')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.16 8.16 0 004.77 1.52V6.74a4.85 4.85 0 01-1-.05z"/></svg>
          TikTok
        </button>
        <button class="share-btn ig" onclick="shareCard('ig')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          Instagram
        </button>
        <button class="share-btn fb" onclick="shareCard('fb')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
        <button class="share-btn save" onclick="saveCard()">
          💾 บันทึกรูป
        </button>
      </div>
    </div>
  </div>
</div>

<canvas id="shareCanvas"></canvas>

let shuffled = [], selectedCard = null;

function getTodayKey() {
  const d = new Date();
  return `demon_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function shuffle() {
  shuffled = [...demonCards].sort(() => Math.random() - 0.5);
  renderCards();
  setTimeout(() => {
    const s = document.getElementById('cardsScroll');
    s.scrollTo({ left: 120, behavior: 'smooth' });
    setTimeout(() => s.scrollTo({ left: 0, behavior: 'smooth' }), 600);
  }, 500);
}

function renderCards() {
  document.getElementById('cardsScroll').innerHTML = shuffled.map((card, i) => {
    const sel = selectedCard && selectedCard.id === card.id;
    return `<div class="card-item ${sel ? 'selected' : ''}" onclick="selectCard(${i})">
      <img src="${BACK}" alt="card"></div>`;
  }).join('');
}

function selectCard(idx) {
  if (selectedCard) return;
  const card = shuffled[idx];
  selectedCard = card;

  // Update slot
  const slot = document.getElementById('slot0');
  slot.className = 'slot filled';
  slot.innerHTML = `<img class="slot-img" src="${BACK}">`;
  renderCards();

  // Show reveal overlay
  document.getElementById('revealFrontImg').src = `../images/demon/${card.id}.png`;
  document.getElementById('revealName').textContent = card.name;
  document.getElementById('revealOverlay').classList.add('show');

  setTimeout(() => {
    document.getElementById('revealInner').classList.add('flipped');
    setTimeout(() => {
      document.getElementById('revealName').classList.add('show');
      setTimeout(() => document.getElementById('btnAccept').classList.add('show'), 300);
    }, 600);
  }, 400);
}

function acceptReading() {
  document.getElementById('revealOverlay').classList.remove('show');
  const card = selectedCard;

  // Save today
  localStorage.setItem(getTodayKey(), card.id);

  showResult(card);
}

function showResult(card) {
  document.getElementById('resultImg').src = `../images/demon/${card.id}.png`;
  document.getElementById('resultName').textContent = card.name;
  document.getElementById('resultWarning').textContent = card.warning;
  document.getElementById('resultMessage').textContent = card.message;
  document.getElementById('resultBox').classList.add('show');
  document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
}

// Share/Save functions
function getShareImage(platform, callback) {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const card = selectedCard || demonCards.find(c => c.id === localStorage.getItem(getTodayKey()));
  if (!card) return;

  const w = 1080;
  const h = 1920;
  canvas.width = w;
  canvas.height = h;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Background
    ctx.fillStyle = '#0a0008';
    ctx.fillRect(0, 0, w, h);

    // Gradient
    const grad = ctx.createRadialGradient(w/2, h*0.35, 0, w/2, h*0.35, w*0.9);
    grad.addColorStop(0, 'rgba(107,33,168,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.textAlign = 'center';
    let y = 90;

    // "WHISPER OF DEMON" — ใหญ่
    ctx.font = `800 ${w * 0.072}px Sarabun, sans-serif`;
    ctx.fillStyle = '#c084fc';
    ctx.fillText('WHISPER OF DEMON', w/2, y);
    y += 50;

    // เส้นบางใต้หัวเรื่อง
    ctx.strokeStyle = 'rgba(192,132,252,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w*0.2, y); ctx.lineTo(w*0.8, y);
    ctx.stroke();
    y += 50;

    // รูปไพ่
    const cardW = w * 0.52;
    const cardH = cardW * 1.5;
    const cardX = (w - cardW) / 2;
    ctx.shadowColor = 'rgba(139,0,139,0.7)';
    ctx.shadowBlur = 60;
    ctx.drawImage(img, cardX, y, cardW, cardH);
    ctx.shadowBlur = 0;
    y += cardH + 50;

    // ชื่อการ์ด
    ctx.font = `800 ${w * 0.068}px Sarabun, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.letterSpacing = '6px';
    ctx.fillText(card.name, w/2, y);
    y += 55;

    // เส้นคั่น
    ctx.strokeStyle = 'rgba(192,132,252,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w*0.25, y); ctx.lineTo(w*0.75, y);
    ctx.stroke();
    y += 45;

    // Warning — สีม่วงสว่าง
    ctx.font = `700 ${w * 0.044}px Sarabun, sans-serif`;
    ctx.fillStyle = '#c084fc';
    ctx.fillText(card.warning, w/2, y);
    y += 55;

    // Message — wrap text
    ctx.font = `${w * 0.034}px Sarabun, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    const maxWidth = w * 0.82;
    const words = card.message.split(' ');
    let line = '';
    for (let i = 0; i < words.length; i++) {
      const test = line + words[i] + ' ';
      if (ctx.measureText(test).width > maxWidth && line !== '') {
        ctx.fillText(line.trim(), w/2, y);
        y += 46;
        line = words[i] + ' ';
      } else {
        line = test;
      }
    }
    if (line.trim()) { ctx.fillText(line.trim(), w/2, y); y += 46; }

    // เส้นก่อน watermark
    y += 20;
    ctx.strokeStyle = 'rgba(192,132,252,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w*0.3, y); ctx.lineTo(w*0.7, y);
    ctx.stroke();
    y += 40;

    // Watermark
    ctx.font = `${w * 0.034}px Sarabun, sans-serif`;
    ctx.fillStyle = 'rgba(192,132,252,0.5)';
    ctx.fillText('mytarot.vip', w/2, y);

    callback(canvas.toDataURL('image/jpeg', 0.92));
  };
  img.src = `../images/demon/${card.id}.png`;
}

async function saveCard() {
  const el = document.getElementById('resultBox');
  const canvas = await html2canvas(el, {
    backgroundColor: '#0a0008',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
  });
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.download = `whisper-${selectedCard?.id || 'demon'}.jpg`;
  a.click();
}

async function shareCard(platform) {
  const el = document.getElementById('resultBox');
  const canvas = await html2canvas(el, {
    backgroundColor: '#0a0008',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
  });
  canvas.toBlob(async (blob) => {
    const file = new File([blob], 'whisper-demon.jpg', { type: 'image/jpeg' });
    if (navigator.share && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: `Whisper of Demon — ${selectedCard?.name}`,
        text: `${selectedCard?.warning}\n\nดูดวงเพิ่มเติมที่ mytarot.vip 🖤`
      });
    } else {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/jpeg', 0.92);
      a.download = `whisper-${selectedCard?.id || 'demon'}.jpg`;
      a.click();
    }
  }, 'image/jpeg', 0.92);
}

function shareCard(platform) {
  getShareImage(platform, (dataUrl) => {
    // สร้าง blob และ share
    fetch(dataUrl)
      .then(r => r.blob())
      .then(blob => {
        const file = new File([blob], `whisper-demon.jpg`, { type: 'image/jpeg' });
        if (navigator.share && navigator.canShare({ files: [file] })) {
          navigator.share({
            files: [file],
            title: `Whisper of Demon — ${selectedCard?.name}`,
            text: `${selectedCard?.warning}\n\nดูดวงเพิ่มเติมที่ mytarot.vip 🖤`
          });
        } else {
          // Fallback: download
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `whisper-${selectedCard?.id || 'demon'}.jpg`;
          a.click();
        }
      });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('coinCount').textContent = parseInt(localStorage.getItem('coins') || '0');

  const key = getTodayKey();
  const savedId = localStorage.getItem(key);
  if (savedId) {
    const card = demonCards.find(c => c.id === savedId);
    if (card) {
      selectedCard = card;
      const slot = document.getElementById('slot0');
      slot.className = 'slot filled';
      slot.innerHTML = `<img class="slot-img" src="../images/demon/${card.id}.png">`;
      showResult(card);
      // Hide cards
      document.querySelector('.cards-section').style.display = 'none';
    }
  } else {
    shuffle();
  }
});
