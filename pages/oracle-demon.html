<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เสียงกระซิบจากปีศาจ — My Tarot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-bottom: 40px; background: #0a0008; }
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid rgba(139,0,139,0.3);
      background: rgba(10,0,8,0.95); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(139,0,139,0.2); border: 1px solid rgba(139,0,139,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #c084fc;
      font-size: 16px; text-decoration: none; flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; color: white; }
    .page-content { padding: 24px 20px 40px; }

    .hero { text-align: center; padding: 24px 0 32px; }
    .hero-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 8px; }
    .hero-desc { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.7; }

    /* Card Back — before reveal */
    .card-container { display: flex; justify-content: center; margin-bottom: 32px; }
    .demon-card {
      width: 200px; height: 320px; border-radius: 20px;
      position: relative; cursor: pointer;
      transition: transform 0.3s;
    }
    .demon-card:hover { transform: translateY(-4px); }
    .card-back {
      width: 100%; height: 100%; border-radius: 20px;
      background: linear-gradient(135deg, #1a0020, #0d000f);
      border: 2px solid rgba(139,0,139,0.5);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      box-shadow: 0 0 40px rgba(139,0,139,0.3);
    }
    .card-back-icon { font-size: 64px; opacity: 0.8; }
    .card-back-text { font-size: 13px; color: rgba(255,255,255,0.4); }

    /* Result */
    .result { display: none; }
    .result-card {
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(139,0,139,0.4);
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(139,0,139,0.2);
    }
    .result-img {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover; display: block;
    }
    .result-name {
      text-align: center; padding: 16px;
      background: rgba(20,0,20,0.8);
      font-size: 22px; font-weight: 800;
      color: #c084fc; letter-spacing: 2px;
      border-top: 1px solid rgba(139,0,139,0.3);
    }

    .warning-box {
      background: rgba(139,0,139,0.08);
      border: 1px solid rgba(139,0,139,0.25);
      border-radius: 16px; padding: 20px;
      margin-bottom: 16px;
    }
    .warning-label {
      font-size: 11px; letter-spacing: 2px; color: #c084fc;
      font-weight: 700; margin-bottom: 10px;
      text-transform: uppercase;
    }
    .warning-title {
      font-size: 17px; font-weight: 700; color: white;
      margin-bottom: 12px;
    }
    .warning-text {
      font-size: 14px; color: rgba(255,255,255,0.7);
      line-height: 1.9;
    }

    .btn-reveal {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #6b21a8, #4a044e);
      border: none; border-radius: 16px;
      color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Sarabun', sans-serif;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(107,33,168,0.4);
    }
    .btn-reveal:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(107,33,168,0.5); }
    .btn-reveal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .already-opened {
      text-align: center; padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; margin-bottom: 20px;
    }
    .already-opened p { color: rgba(255,255,255,0.4); font-size: 14px; }
    .already-opened .reset-time { color: #c084fc; font-weight: 700; margin-top: 4px; }

    .tagline {
      text-align: center; font-size: 12px;
      color: rgba(255,255,255,0.2); margin-top: 24px;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="page-header">
  <a href="oracle.html" class="back-btn">←</a>
  <div class="page-title">🖤 เสียงกระซิบจากปีศาจ</div>
  <div style="margin-left:auto" class="coin-badge">🪙 <span id="coinCount">500</span></div>
</div>

<div class="page-content">
  <div class="hero">
    <div class="hero-title">🖤 Whisper of Demon</div>
    <div class="hero-desc">เปิดไพ่เพื่อรับคำเตือนจากเงามืด<br>ได้เพียงวันละ 1 ครั้งเท่านั้น</div>
  </div>

  <!-- Already opened today -->
  <div id="alreadyOpened" style="display:none">
    <div class="already-opened">
      <p>🌙 เจ้าได้รับคำเตือนของวันนี้แล้ว</p>
      <div class="reset-time">จะรีเซ็ตเที่ยงคืนนี้</div>
    </div>
  </div>

  <!-- Card to reveal -->
  <div id="cardReveal">
    <div class="card-container">
      <div class="demon-card" onclick="revealCard()">
       <div class="card-back">
  <img src="../images/demon/backdemon.png" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:18px;">
          <div class="card-back-text">แตะเพื่อเปิดไพ่</div>
        </div>
      </div>
    </div>
    <button class="btn-reveal" onclick="revealCard()">🖤 รับคำเตือนจากปีศาจ</button>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-card">
      <img class="result-img" id="resultImg" src="" alt="">
      <div class="result-name" id="resultName"></div>
    </div>

    <div class="warning-box">
      <div class="warning-label">✦ คำเตือนจากปีศาจ ✦</div>
      <div class="warning-title" id="resultWarning"></div>
      <div class="warning-text" id="resultMessage"></div>
    </div>

    <div class="tagline">จงฟังเสียงเตือนนี้ไว้ในใจ...</div>
  </div>
</div>

<script>
const demonCards = [
  {

  {

function getTodayKey() {
  const d = new Date();
  return `demon_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function revealCard() {
  const key = getTodayKey();
  if (localStorage.getItem(key)) return;

  const card = demonCards[Math.floor(Math.random() * demonCards.length)];
  localStorage.setItem(key, card.id);
  showResult(card);
}

function showResult(card) {
  document.getElementById('cardReveal').style.display = 'none';
  document.getElementById('alreadyOpened').style.display = 'none';

  const result = document.getElementById('result');
  result.style.display = 'block';

  document.getElementById('resultImg').src = `../images/demon/${card.id}.png`;
  document.getElementById('resultImg').alt = card.name;
  document.getElementById('resultName').textContent = card.name;
  document.getElementById('resultWarning').textContent = card.warning;
  document.getElementById('resultMessage').textContent = card.message;

  result.scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('coinCount').textContent = parseInt(localStorage.getItem('coins') || '500');

  const key = getTodayKey();
  const savedId = localStorage.getItem(key);

  if (savedId) {
    const card = demonCards.find(c => c.id === savedId);
    if (card) {
      showResult(card);
      document.getElementById('alreadyOpened').style.display = 'none';
    }
  }
});
</script>
