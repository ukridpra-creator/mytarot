<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ไพ่ออราเคิล — My Tarot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-bottom: 40px; }
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,8,32,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(124,58,237,0.2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--purple-light);
      font-size: 16px; text-decoration: none; flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; color: white; }
    .page-content { padding: 24px 20px 40px; }
    .reading-hero { text-align: center; padding: 16px 0 28px; }
    .reading-icon {
      width: 72px; height: 72px; border-radius: 20px; overflow: hidden;
      margin: 0 auto 14px; border: 2px solid rgba(124,58,237,0.4);
    }
    .reading-icon img { width: 100%; height: 100%; object-fit: cover; }
    .reading-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
    .reading-desc { font-size: 13px; color: var(--dim); line-height: 1.7; }
    .menu-list { display: flex; flex-direction: column; gap: 12px; }
    .menu-card {
      display: flex; align-items: center; gap: 16px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; cursor: pointer;
      text-decoration: none; transition: all 0.3s; position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(236,72,153,0.05));
      opacity: 0; transition: opacity 0.3s;
    }
    .menu-card:hover::before { opacity: 1; }
    .menu-card:hover { border-color: rgba(124,58,237,0.5); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .menu-card.accent { border-left: 3px solid #a855f7; }
    .menu-card.accent-dark { border-left: 3px solid #6b21a8; }
    .menu-icon {
      width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .menu-icon.purple { background: rgba(124,58,237,0.2); }
    .menu-icon.dark { background: rgba(30,10,60,0.6); border: 1px solid rgba(124,58,237,0.3); }
    .menu-info { flex: 1; }
    .menu-name { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; }
    .menu-desc { font-size: 12px; color: var(--dim); line-height: 1.5; }
    .menu-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; flex-shrink: 0;
      background: rgba(245,158,11,0.15); color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.3);
    }
    .menu-badge.free {
      background: rgba(16,185,129,0.15); color: #10b981;
      border: 1px solid rgba(16,185,129,0.3);
    }
    .menu-arrow { font-size: 18px; color: var(--dim); flex-shrink: 0; }
    .section-title {
      font-size: 12px; color: var(--dim); font-weight: 700;
      letter-spacing: 1px; margin-bottom: 12px; margin-top: 8px; padding-left: 4px;
    }
    .deck-cosmic {
      background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(59,130,246,0.05));
      border-color: rgba(124,58,237,0.25);
    }
    .deck-demon {
      background: linear-gradient(135deg, rgba(60,10,80,0.15), rgba(30,5,40,0.1));
      border-color: rgba(139,0,139,0.25);
    }
  </style>
</head>
<body>

<div class="page-header">
  <a href="../index.html" class="back-btn">←</a>
  <div class="page-title">ไพ่ออราเคิล</div>
  <div style="margin-left:auto" class="coin-badge">🪙 <span id="coinCount">500</span></div>
</div>

<div class="page-content">
  <div class="reading-hero">
    <div class="reading-icon"><img src="../images/icon-oracle.png" alt="ไพ่ออราเคิล"></div>
    <div class="reading-title">ไพ่ออราเคิล</div>
    <div class="reading-desc">เลือกชุดไพ่ที่ต้องการค่ะ แต่ละชุดมีพลังงานแตกต่างกัน 🌌</div>
  </div>

  <div class="section-title">🌌 ชุดไพ่</div>
  <div class="menu-list">

    <a href="oracle-cosmic.html" class="menu-card accent deck-cosmic">
  <div class="menu-icon purple" style="padding:0;overflow:hidden;">
    <img src="../images/icon-cosmic.png" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
  </div>
  <div class="menu-info">
    <div class="menu-name">พลังแห่งจักรวาล</div>
    <div class="menu-desc">ดึงไพ่ 3 ใบจากพลังดาว Planet · Event · Concept รับสารจากจักรวาลค่ะ</div>
  </div>
  <div class="menu-badge">🪙 15</div>
  <div class="menu-arrow">›</div>
</a>

    <a href="oracle-demon.html" class="menu-card accent-dark deck-demon">
  <div class="menu-icon dark" style="padding:0;overflow:hidden;">
    <img src="../images/icon-demon.png" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
  </div>
  <div class="menu-info">
    <div class="menu-name">เสียงกระซิบจากปีศาจ</div>
    <div class="menu-desc">เปิดไพ่ 1 ใบต่อวัน รับคำเตือนจากเงามืด ฟรีทุกวันค่ะ</div>
  </div>
  <div class="menu-badge free">ฟรี</div>
  <div class="menu-arrow">›</div>
</a>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('coinCount').textContent = parseInt(localStorage.getItem('coins') || '500');
});
</script>
</body>
</html>
