<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โนะ ออราเคิล | MyTarot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600;700&family=Noto+Sans+Thai:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;600&display=swap');

  :root {
    --paper: #f0e6d0;
    --paper-dark: #d4c4a0;
    --ink: #1a1008;
    --ink-mid: #3d2b10;
    --ink-light: #6b4e28;
    --crimson: #8b1a1a;
    --crimson-light: #c0392b;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --ash: #4a4040;
    --mist: rgba(240,230,208,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #120a04;
    min-height: 100vh;
    font-family: 'Noto Sans Thai', sans-serif;
    color: var(--paper);
    overflow-x: hidden;
  }

  /* ─── BG TEXTURE ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(139,26,26,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(184,134,11,0.06) 0%, transparent 50%),
      repeating-linear-gradient(
        0deg, transparent, transparent 60px,
        rgba(240,230,208,0.015) 60px, rgba(240,230,208,0.015) 61px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap { position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    padding: 36px 20px 20px;
    border-bottom: 1px solid rgba(184,134,11,0.2);
    margin-bottom: 4px;
  }

  .mascot-wrap {
    width: 100px; height: 100px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    overflow: hidden;
    box-shadow: 0 0 24px rgba(184,134,11,0.3), inset 0 0 20px rgba(0,0,0,0.4);
    background: #1a0e06;
    display: flex; align-items: center; justify-content: center;
  }

  .mascot-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .mascot-placeholder { font-size: 52px; }

  .title-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .title-th {
    font-family: 'Noto Serif Thai', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--paper);
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(184,134,11,0.4);
  }

  .subtitle {
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* ─── COIN ─── */
  .coin-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 6px; margin: 14px 0 0;
    font-size: 13px; color: var(--paper-dark);
  }
  .coin-count { font-weight: 600; color: var(--gold-light); font-size: 15px; }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    padding: 0 24px; margin: 16px 0;
    opacity: 0.4;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gold);
  }
  .divider span { font-family: 'Noto Serif JP', serif; font-size: 12px; color: var(--gold); }

  /* ─── MOOD SELECT ─── */
  .mood-label {
    text-align: center;
    font-size: 12px;
    color: var(--paper-dark);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .mood-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 16px;
  }

  .mood-btn {
    padding: 10px 8px;
    background: rgba(240,230,208,0.04);
    border: 1px solid rgba(184,134,11,0.25);
    border-radius: 8px;
    color: var(--paper);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mood-btn:hover { background: rgba(184,134,11,0.1); border-color: var(--gold); }

  .mood-btn.selected {
    background: rgba(139,26,26,0.3);
    border-color: var(--crimson-light);
    color: var(--paper);
    box-shadow: 0 0 12px rgba(139,26,26,0.3);
  }

  /* ─── MODE TABS ─── */
  .mode-tabs {
    display: flex; gap: 8px;
    justify-content: center;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .tab-btn {
    flex: 1; max-width: 110px;
    padding: 10px 6px;
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 4px;
    background: rgba(240,230,208,0.03);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Noto Sans Thai', sans-serif;
  }

  .tab-btn .tab-icon { font-size: 16px; display: block; margin-bottom: 3px; }
  .tab-btn .tab-name { font-size: 12px; color: var(--paper-dark); display: block; }
  .tab-btn .tab-cost { font-size: 11px; color: var(--gold); display: block; margin-top: 2px; }

  .tab-btn.active {
    background: rgba(139,26,26,0.25);
    border-color: var(--crimson);
    box-shadow: 0 0 14px rgba(139,26,26,0.2);
  }
  .tab-btn.active .tab-name { color: var(--paper); }

  .mode-desc {
    text-align: center;
    font-size: 11px;
    color: var(--ink-light);
    margin-bottom: 16px;
    padding: 0 24px;
    line-height: 1.8;
    min-height: 32px;
    font-style: italic;
  }

  /* ─── DRAW BUTTON ─── */
  .draw-btn-wrap { padding: 0 20px; margin-bottom: 24px; }

  .draw-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #5a0a0a, #8b1a1a);
    border: 1px solid var(--crimson-light);
    border-radius: 4px;
    color: var(--paper);
    font-family: 'Noto Serif Thai', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 4px 20px rgba(139,26,26,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.2s;
  }

  .draw-btn:active { transform: scale(0.98); }
  .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── CARDS AREA ─── */
  .cards-area { padding: 0 20px; margin-bottom: 20px; }

  .cards-layout-1 { display: flex; justify-content: center; }

  .cards-layout-3 { display: flex; gap: 10px; justify-content: center; }

  .cards-layout-5 {
    display: grid;
    grid-template-areas: ". top ." "left mid right" ". bot .";
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 300px;
    margin: 0 auto;
  }

  .card-slot.pos-top    { grid-area: top; }
  .card-slot.pos-left   { grid-area: left; }
  .card-slot.pos-mid    { grid-area: mid; }
  .card-slot.pos-right  { grid-area: right; }
  .card-slot.pos-bot    { grid-area: bot; }

  /* Card flip */
  .card-flip {
    perspective: 700px;
    width: 88px; height: 130px;
    margin: 0 auto; cursor: pointer;
  }

  .cards-layout-1 .card-flip { width: 130px; height: 190px; }

  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(184,134,11,0.2);
  }

  /* Card Back */
  .card-back {
    background: #0d0704;
    display: flex; align-items: center; justify-content: center;
  }

  .card-back img { width: 100%; height: 100%; object-fit: cover; }

  .card-back-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; width: 100%;
    background: radial-gradient(ellipse at center, #1a0a04 0%, #080402 100%);
    gap: 6px;
  }

  .card-back-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 32px;
    color: var(--gold);
    opacity: 0.5;
    text-shadow: 0 0 10px rgba(184,134,11,0.5);
  }

  .cards-layout-1 .card-back-kanji { font-size: 48px; }

  .card-back-border {
    position: absolute; inset: 5px;
    border: 1px solid rgba(184,134,11,0.2);
    border-radius: 3px;
  }

  /* Card Front */
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #f5ead8 0%, #e8d5b0 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 6px;
    border: 1px solid var(--gold);
  }

  .card-front .card-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .cards-layout-1 .card-front .card-kanji { font-size: 32px; }

  .card-front .card-gold-line {
    width: 28px; height: 1px;
    background: var(--gold); margin: 4px 0;
  }

  .card-front .card-name-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 9px;
    color: var(--ink-light);
    margin-bottom: 2px;
  }

  .card-front .card-name-th {
    font-family: 'Noto Serif Thai', serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    line-height: 1.4;
  }

  .cards-layout-1 .card-front .card-name-th { font-size: 12px; }

  .card-front .card-pos-label {
    font-size: 9px;
    color: var(--crimson);
    margin-top: 4px;
    font-weight: 500;
  }

  .card-front .card-seal {
    position: absolute; bottom: 6px; right: 6px;
    font-family: 'Noto Serif JP', serif;
    font-size: 8px;
    color: var(--crimson);
    opacity: 0.5;
    border: 1px solid var(--crimson);
    padding: 1px 2px;
    border-radius: 1px;
  }

  /* ─── READING ─── */
  .reading-wrap {
    margin: 0 20px 32px;
    background: rgba(10,5,2,0.85);
    border: 1px solid rgba(184,134,11,0.25);
    border-radius: 6px;
    padding: 20px 18px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    display: none;
  }

  .reading-wrap.show { display: block; }

  .reading-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(184,134,11,0.2);
  }

  .reading-header .mask-icon {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; color: var(--gold);
  }

  .reading-header h3 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 14px; font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 1px;
  }

  .reading-text {
    font-size: 14px;
    line-height: 2.1;
    color: var(--paper);
    white-space: pre-wrap;
    font-family: 'Noto Serif Thai', serif;
    font-weight: 300;
  }

  .reading-loading {
    text-align: center; padding: 20px;
    color: var(--gold); font-size: 13px;
    letter-spacing: 2px;
  }

  .dots span { animation: blink 1.4s infinite; display: inline-block; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%,80%,100% { opacity: 0.15; }
    40% { opacity: 1; }
  }

  /* ─── LOGIN MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal-box {
    background: #1a0e06;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 32px 24px;
    text-align: center;
    width: 85%; max-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 30px rgba(184,134,11,0.1);
  }

  .modal-box h3 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 17px; margin-bottom: 8px; color: var(--paper);
  }

  .modal-box p {
    font-size: 13px; color: var(--paper-dark);
    margin-bottom: 20px; line-height: 1.8;
  }

  .btn-google {
    width: 100%; padding: 12px;
    background: rgba(240,230,208,0.05);
    border: 1px solid rgba(184,134,11,0.4);
    border-radius: 4px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--paper);
    transition: all 0.2s;
  }

  .btn-google:hover { background: rgba(184,134,11,0.1); }

  .btn-close-modal {
    margin-top: 12px; background: none; border: none;
    color: var(--ink-light); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans Thai', sans-serif;
  }

  /* ─── SMOKE PARTICLE ─── */
  .smoke {
    position: fixed; pointer-events: none; z-index: 50;
    font-size: 20px;
    animation: smokeRise linear forwards;
  }

  @keyframes smokeRise {
    0%   { transform: translateY(0) scale(1); opacity: 0.8; }
    100% { transform: translateY(-120px) scale(2.5); opacity: 0; }
  }
</style>
</head>
<body>
<div class="page-wrap">

<!-- HEADER -->
<div class="header">
  <div class="mascot-wrap">
    <img src="images/noh-mascot.png" alt="Noh Oracle"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
    <div class="mascot-placeholder" style="display:none">🎭</div>
  </div>
  <div class="title-jp">能 オラクル · NOH ORACLE</div>
  <div class="title-th">โนะ ออราเคิล</div>
  <div class="subtitle">ไพ่หน้ากากแห่งวิญญาณญี่ปุ่น</div>
  <div class="coin-bar">
    🪙 <span id="coinCount">—</span>
  </div>
</div>

<!-- MOOD -->
<div class="divider"><span>能</span></div>

<div class="mood-label">— นายท่านรู้สึกแบบใดในขณะนี้ —</div>

<div class="mood-grid">
  <button class="mood-btn" onclick="selectMood(this, 'สับสนและไม่แน่ใจในทิศทางชีวิต')">🌫️ สับสน</button>
  <button class="mood-btn" onclick="selectMood(this, 'เจ็บปวดและบอบช้ำจากบางสิ่ง')">🔥 เจ็บปวด</button>
  <button class="mood-btn" onclick="selectMood(this, 'โดดเดี่ยวและรู้สึกไม่มีใครเข้าใจ')">🌙 โดดเดี่ยว</button>
  <button class="mood-btn" onclick="selectMood(this, 'อยากรู้ว่าอนาคตจะพาไปทางไหน')">✨ อยากรู้อนาคต</button>
  <button class="mood-btn" onclick="selectMood(this, 'รู้สึกหนักใจและแบกรับมากเกินไป')">⛓️ หนักใจ</button>
  <button class="mood-btn" onclick="selectMood(this, 'ไม่มีความรู้สึกชัดเจน ปล่อยให้วิญญาณนำทาง')">😶 ปล่อยให้วิญญาณนำ</button>
</div>

<!-- MODE TABS -->
<div class="divider"><span>面</span></div>

<div class="mode-tabs">
  <button class="tab-btn active" onclick="selectMode(1)">
    <span class="tab-icon">🎭</span>
    <span class="tab-name">1 ใบ</span>
    <span class="tab-cost">10 🪙</span>
  </button>
  <button class="tab-btn" onclick="selectMode(3)">
    <span class="tab-icon">🎭🎭</span>
    <span class="tab-name">3 ใบ</span>
    <span class="tab-cost">20 🪙</span>
  </button>
  <button class="tab-btn" onclick="selectMode(5)">
    <span class="tab-icon">🎭🎭🎭</span>
    <span class="tab-name">5 ใบ</span>
    <span class="tab-cost">30 🪙</span>
  </button>
</div>

<div class="mode-desc" id="modeDesc">หน้ากากแห่งวันนี้ — วิญญาณจะเปิดเผยสิ่งที่ซ่อนอยู่</div>

<!-- DRAW BUTTON -->
<div class="draw-btn-wrap">
  <button class="draw-btn" id="drawBtn" onclick="drawCards()">
    🎭 เปิดเผยหน้ากาก
  </button>
</div>

<!-- CARDS AREA -->
<div class="cards-area" id="cardsArea"></div>

<!-- READING -->
<div class="reading-wrap" id="readingWrap">
  <div class="reading-header">
    <span class="mask-icon">面</span>
    <h3>วิญญาณแห่งโนะกล่าวว่า...</h3>
  </div>
  <div class="reading-text" id="readingText"></div>
</div>

</div><!-- /page-wrap -->

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <h3>🎭 ต้องเข้าสู่ระบบก่อน</h3>
    <p>ข้าจะเปิดเผยหน้ากากให้นายท่าน<br>หลังจากยืนยันตัวตนแล้วเท่านั้น</p>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.google.com/favicon.ico" width="18"> เข้าสู่ระบบด้วย Google
    </button>
    <button class="btn-close-modal" onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "my-tarot67.firebaseapp.com",
  projectId: "my-tarot67",
  storageBucket: "my-tarot67.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

var app = initializeApp(firebaseConfig);
var auth = getAuth(app);
var db = getFirestore(app);
var currentUser = null;

// ─── CARD DATA 36 ใบ ───
var allCards = [
  // หมวด 1: หน้ากากหญิง
  { kanji:"若女", jp:"Wakaonna",  th:"หญิงสาว",          kw:"ความหวัง ความบริสุทธิ์ จุดเริ่มต้นของความรัก",        cat:"female" },
  { kanji:"小面", jp:"Ko-omote",  th:"หญิงงามอ่อนเยาว์", kw:"เสน่ห์ที่ซ่อนเร้น ความลึกลับ อำนาจที่อ่อนโยน",      cat:"female" },
  { kanji:"深井", jp:"Fukai",     th:"หญิงกลางคน",        kw:"ความเศร้าลึก ความอาลัย ความรักที่ไม่มีวันลืม",       cat:"female" },
  { kanji:"姥",   jp:"Uba",       th:"หญิงชรา",           kw:"ปัญญาแห่งกาลเวลา การยอมรับ ความงามของวัยชรา",        cat:"female" },
  { kanji:"般若", jp:"Hannya",    th:"หญิงอิจฉาริษยา",   kw:"ความโกรธที่สะสม การปล่อยวาง พลังงานที่ต้องระบาย",    cat:"female" },
  { kanji:"泥眼", jp:"Deigan",    th:"หญิงกลายเป็นวิญญาณ",kw:"จุดเปลี่ยนครั้งใหญ่ การแปลงร่าง ไม่มีทางกลับ",     cat:"female" },
  { kanji:"山姥", jp:"Yamauba",   th:"แม่มดภูเขา",        kw:"พลังดิบแห่งธรรมชาติ สัญชาตญาณที่ไม่ถูกกัก",         cat:"female" },
  { kanji:"静面", jp:"Shizuka",   th:"หญิงเงียบงัน",      kw:"ความสงบที่ซ่อนพลัง การรอคอยที่มีความหมาย",           cat:"female" },
  { kanji:"増女", jp:"Masugami",  th:"หญิงบ้าคลั่ง",      kw:"อิสรภาพจากกรอบ ทลายขีดจำกัด พลังที่ถูกปลดปล่อย",   cat:"female" },
  // หมวด 2: หน้ากากชาย

  { kanji:"朝倉", jp:"Asakura",   th:"ผู้พิพากษา",         kw:"กรรมและผลกรรม ความยุติธรรมที่ไม่มีวันหลบหนี",        cat:"male" },
  { kanji:"童子", jp:"Doji",      th:"เด็กศักดิ์สิทธิ์",  kw:"ความบริสุทธิ์ที่แท้จริง เริ่มต้นใหม่ด้วยหัวใจเด็ก", cat:"male" },

  { kanji:"猩々", jp:"Shojo",     th:"วิญญาณแห่งสุรา",     kw:"ความสุขที่แท้จริง ปลดปล่อยตัวเองบ้าง เฉลิมฉลองชีวิต",cat:"spirit"},

  { kanji:"石橋", jp:"Shakkyo",   th:"สิงโตศักดิ์สิทธิ์",  kw:"พลังปกป้องที่แข็งแกร่ง กล้าสู้เพื่อสิ่งที่รัก",     cat:"spirit" },
  // หมวด 4: หน้ากากปีศาจ
  { kanji:"天狗", jp:"Tengu",     th:"อสูรภูเขา",          kw:"ความเย่อหยิ่งที่ต้องเรียนรู้ บทเรียนที่เจ็บปวด",     cat:"demon" },
  { kanji:"獅子口",jp:"Shishiguchi",th:"ปากสิงโตปีศาจ",   kw:"พลังดิบที่ต้องควบคุม ความโกรธที่ยังไม่ระบาย",        cat:"demon" },
  { kanji:"大飛出",jp:"Otobide",  th:"ปีศาจโผล่ใหญ่",     kw:"ความกลัวที่ต้องเผชิญ สิ่งที่หนีอยู่กำลังตามมา",      cat:"demon" },
  { kanji:"悪尉", jp:"Akujo",     th:"ผู้เฒ่าชั่วร้าย",    kw:"กรรมเก่าที่ต้องชำระ สิ่งที่ทำไว้จะย้อนกลับมา",      cat:"demon" },
  { kanji:"鬼神", jp:"Kishin",    th:"เทพปีศาจ",           kw:"พลังทำลายล้างที่นำมาซึ่งการเกิดใหม่ ต้องพังก่อนสร้าง",cat:"demon"},
  { kanji:"火焔", jp:"Kaen",      th:"ปีศาจไฟ",            kw:"ความหุนหันพลันแล่น ไฟที่เผาไหม้สิ่งเก่า",            cat:"demon" },
  { kanji:"蛇",   jp:"Ja",        th:"งูปีศาจ",            kw:"การล่อลวงที่หอมหวาน สัญชาตญาณที่ต้องเชื่อ",          cat:"demon" },
  { kanji:"夜叉", jp:"Yasha",     th:"ยักษ์ราตรี",         kw:"พลังกลางคืน ความจริงที่ซ่อนอยู่ในความมืด",           cat:"demon" },
  { kanji:"鬼",   jp:"Oni",       th:"โอนิ",               kw:"เงาของตัวเอง สิ่งที่ปฏิเสธในตัวเอง ต้องยอมรับ",      cat:"demon" }
];

var posLabels1 = ["หน้ากากแห่งวันนี้"];
var posLabels3 = ["หน้ากากที่โลกเห็น", "หน้ากากที่ซ่อนไว้", "หน้ากากที่ต้องถอด"];
var posLabels5 = ["บทบาทที่เล่นอยู่", "อารมณ์ที่กดไว้", "แก่นแท้", "บทเรียนจากวิญญาณ", "การเปลี่ยนแปลงที่รอ"];

var currentMode = 1;
var selectedMood = "";
var drawnCards = [];

// ─── AUTH ───
onAuthStateChanged(auth, async function(user) {
  currentUser = user;
  if (user) {
    var snap = await getDoc(doc(db, "users", user.uid));
    var coins = snap.exists() ? (snap.data().coins || 0) : 0;
    updateCoinUI(coins);
  } else {
    updateCoinUI(null);
  }
});

window.updateCoinUI = function(coins) {
  var el = document.getElementById("coinCount");
  if (coins === null || coins === undefined) {
    el.textContent = "กรุณาล็อกอิน";
    el.style.color = "#6b4e28";
  } else {
    el.textContent = coins + " เหรียญ";
    el.style.color = "var(--gold-light)";
  }
};

window.loginGoogle = async function() {
  var provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); closeModal(); } catch(e) {}
};

window.loginNow = function() {
  document.getElementById("loginModal").classList.add("show");
};

window.closeModal = function() {
  document.getElementById("loginModal").classList.remove("show");
};

// ─── MOOD ───
window.selectMood = function(btn, mood) {
  document.querySelectorAll(".mood-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
  selectedMood = mood;
};

// ─── MODE ───
window.selectMode = function(n) {
  currentMode = n;
  document.querySelectorAll(".tab-btn").forEach(function(t, i) {
    t.classList.toggle("active", [1,3,5][i] === n);
  });
  var descs = {
    1: "หน้ากากแห่งวันนี้ — วิญญาณจะเปิดเผยสิ่งที่ซ่อนอยู่",
    3: "หน้ากากที่โลกเห็น • ที่ซ่อนไว้ • ที่ต้องถอดออก",
    5: "เวทีโนะแห่งชีวิต — ห้าหน้ากากแห่งจิตวิญญาณ"
  };
  document.getElementById("modeDesc").textContent = descs[n];
  document.getElementById("cardsArea").innerHTML = "";
  document.getElementById("readingWrap").classList.remove("show");
  drawnCards = [];
};

// ─── DRAW ───
window.drawCards = async function() {
  if (!currentUser) { loginNow(); return; }

  drawnCards = [];
  var shuffled = allCards.slice().sort(function() { return Math.random() - 0.5; });
  drawnCards = shuffled.slice(0, currentMode);

  renderCards();

  var btn = document.getElementById("drawBtn");
  btn.disabled = true;

  // เปิดทีละใบ
  for (var i = 0; i < drawnCards.length; i++) {
    await sleep(500 + i * 350);
    var inner = document.getElementById("cardInner_" + i);
    if (inner) inner.classList.add("flipped");
    spawnSmoke();
  }

  await callReading();
  btn.disabled = false;
};

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function renderCards() {
  var area = document.getElementById("cardsArea");
  var posLabels = currentMode === 1 ? posLabels1 : currentMode === 3 ? posLabels3 : posLabels5;

  if (currentMode === 1) {
    area.innerHTML = '<div class="cards-layout-1">' + cardHTML(0, posLabels[0]) + '</div>';
  } else if (currentMode === 3) {
    var html = '<div class="cards-layout-3">';
    for (var i = 0; i < 3; i++) html += cardHTML(i, posLabels[i]);
    html += '</div>';
    area.innerHTML = html;
  } else {
    var posClass = ["pos-top","pos-left","pos-mid","pos-right","pos-bot"];
    var html = '<div class="cards-layout-5">';
    for (var i = 0; i < 5; i++) {
      html += '<div class="card-slot ' + posClass[i] + '">' + cardHTML(i, posLabels[i]) + '</div>';
    }
    html += '</div>';
    area.innerHTML = html;
  }
}

function cardHTML(idx, label) {
  var card = drawnCards[idx];
  return '<div class="card-flip">' +
    '<div class="card-inner" id="cardInner_' + idx + '">' +
      '<div class="card-face card-back">' +
        '<img src="images/noh-card-back.png" alt="card back" ' +
          'onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="card-back-placeholder" style="display:none">' +
          '<div class="card-back-kanji">能</div>' +
          '<div class="card-back-border"></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-face card-front">' +
        '<div class="card-kanji">' + card.kanji + '</div>' +
        '<div class="card-gold-line"></div>' +
        '<div class="card-name-jp">' + card.jp + '</div>' +
        '<div class="card-name-th">' + card.th + '</div>' +
        '<div class="card-pos-label">' + label + '</div>' +
        '<div class="card-seal">能</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ─── API CALL ───
async function callReading() {
  var wrap = document.getElementById("readingWrap");
  var textEl = document.getElementById("readingText");
  wrap.classList.add("show");
  textEl.innerHTML = '<div class="reading-loading">能 กำลังอ่านวิญญาณ <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>';

  var serviceMap = { 1: "noh-oracle-1", 3: "noh-oracle-3", 5: "noh-oracle-5" };
  var service = serviceMap[currentMode];

  var posLabels = currentMode === 1 ? posLabels1 : currentMode === 3 ? posLabels3 : posLabels5;

  // bonus mechanic
  var catCount = {};
  drawnCards.forEach(function(c) { catCount[c.cat] = (catCount[c.cat] || 0) + 1; });
  var bonus = "";
  if ((catCount["demon"] || 0) >= 2) bonus = "\n\n⚠️ กติกาพิเศษ: จั่วได้หน้ากากปีศาจ 2 ใบขึ้นไป — วิญญาณกำลังทดสอบนายท่าน ให้เพิ่มข้อความพิเศษเรื่องการทดสอบและการผ่านพ้น";
  if ((catCount["female"] || 0) >= 3) bonus = "\n\n✨ กติกาพิเศษ: จั่วได้หน้ากากหญิงล้วน — พลังหญิงกำลังตื่น ให้เพิ่มข้อความพิเศษเรื่องพลังงานหญิงและสัญชาตญาณ";

  var cardList = drawnCards.map(function(c, i) {
    return "ตำแหน่ง "" + posLabels[i] + "": " + c.kanji + " " + c.jp + " — " + c.th + " (" + c.kw + ")";
  }).join("\n");

  var moodText = selectedMood ? "พลังงานของนายท่านในขณะนี้: " + selectedMood : "นายท่านไม่ได้ระบุพลังงาน ให้อ่านตามสิ่งที่หน้ากากบอก";

  var promptText =
    "ข้าคือวิญญาณแห่งโนะ ผู้อ่านหน้ากากแห่งจิตวิญญาณมาแต่โบราณ\n" +
    "ข้าเรียกผู้ถามว่า 'นายท่าน' และแทนตัวเองว่า 'ข้า'\n" +
    "โทนการพูด: โบราณ ลึกซึ้ง หนักแน่น ไม่หวาน ไม่พยักหน้าเยอะ เหมือนนักบวชที่อ่านวิญญาณ\n" +
    "ใช้ภาษาไทยที่มีกลิ่นอายโบราณนิดๆ แต่ยังอ่านเข้าใจง่าย\n\n" +
    moodText + "\n\n" +
    "หน้ากากที่จั่วได้:\n" + cardList + bonus + "\n\n" +
    "กรุณาทำนายโดยแบ่งเป็น:\n" +
    "🎭 ความหมายของแต่ละหน้ากาก\n" +
    "⛩️ สิ่งที่หน้ากากเหล่านี้รวมกันบอกนายท่าน\n" +
    "🕯️ สิ่งที่ข้าขอกราบทูลนายท่านไว้\n\n" +
    "ทำนายให้ลึก หนักแน่น และตรงไปตรงมาแบบวิญญาณที่ไม่โกหก";

  try {
    var idToken = await currentUser.getIdToken();

    var res = await fetch("/api/claude", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + idToken
      },
      body: JSON.stringify({
        service: service,
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: promptText }]
      })
    });

    var newCoins = res.headers.get("X-New-Coin-Balance");
    if (newCoins !== null) updateCoinUI(parseInt(newCoins) + " เหรียญ");

    if (!res.ok) {
      var err = await res.json();
      textEl.textContent = err.error === "insufficient_coins"
        ? "นายท่านมีเหรียญไม่เพียงพอ 🪙 กรุณาเติมเหรียญก่อน"
        : "เกิดข้อผิดพลาด ข้าขอโทษ กรุณาลองใหม่อีกครั้ง";
      return;
    }

    // stream
    textEl.textContent = "";
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var fullText = "";

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      var text = decoder.decode(chunk.value, { stream: true });
      fullText += text;
      textEl.textContent = fullText;
    }

    // save firestore
    await addDoc(collection(db, "users", currentUser.uid, "readings"), {
      type: "noh-oracle",
      mode: currentMode,
      mood: selectedMood,
      cards: drawnCards.map(function(c) { return c.kanji + " " + c.th; }),
      reading: fullText,
      createdAt: serverTimestamp()
    });

  } catch(e) {
    textEl.textContent = "เกิดข้อผิดพลาด ข้าขอโทษนายท่าน กรุณาลองใหม่อีกครั้ง";
    console.error(e);
  }
}

// ─── SMOKE ───
function spawnSmoke() {
  var emojis = ["🎭","💨","🌫️"];
  for (var i = 0; i < 5; i++) {
    (function(i) {
      setTimeout(function() {
        var s = document.createElement("div");
        s.className = "smoke";
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = (30 + Math.random() * 40) + "vw";
        s.style.bottom = "40vh";
        s.style.animationDuration = (1.5 + Math.random()) + "s";
        document.body.appendChild(s);
        setTimeout(function() { s.remove(); }, 3000);
      }, i * 120);
    })(i);
  }
}

window.drawCards = drawCards;
window.selectMode = selectMode;
window.selectMood = selectMood;

</script>
