<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ซาจูเกาหลี — My Tarot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-bottom: 40px; }
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,8,32,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(124,58,237,0.2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--purple-light);
      font-size: 16px; text-decoration: none; flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; color: white; }
    .page-content { padding: 24px 20px 40px; }
    .reading-hero { text-align: center; padding: 16px 0 24px; }
    .reading-icon {
      width: 72px; height: 72px; border-radius: 20px; overflow: hidden;
      margin: 0 auto 14px; border: 2px solid rgba(124,58,237,0.4);
    }
    .reading-icon img { width: 100%; height: 100%; object-fit: cover; }
    .reading-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
    .reading-desc { font-size: 13px; color: var(--dim); line-height: 1.7; }
    .form-box {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 20px;
    }
    .form-row { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: var(--gold); font-weight: 700; margin-bottom: 8px; display: block; }
    .form-hint { font-size: 11px; color: var(--dim); margin-top: 6px; }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; color: white; font-size: 15px;
      font-family: 'Sarabun', sans-serif; outline: none;
      transition: border-color 0.2s; box-sizing: border-box;
    }
    .form-input:focus { border-color: var(--purple-light); }
    .gender-row { display: flex; gap: 10px; }
    .gender-btn {
      flex: 1; padding: 12px; border-radius: 12px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.03);
      color: var(--dim); font-size: 14px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .gender-btn.active {
      background: rgba(124,58,237,0.2); border-color: var(--purple-light);
      color: var(--purple-light);
    }
    .coin-box {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 16px; padding: 14px; margin-bottom: 16px; text-align: center;
    }
    .coin-text { font-size: 13px; color: var(--gold); margin-bottom: 4px; }
    .coin-hint { font-size: 11px; color: var(--dim); }
    .btn-read {
      width: 100%; background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none; border-radius: 16px; padding: 16px; color: white;
      font-size: 16px; font-weight: 700; font-family: 'Sarabun', sans-serif;
      cursor: pointer; transition: all 0.3s; margin-bottom: 20px;
    }
    .btn-read:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
    .btn-read:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-box {
      background: rgba(124,58,237,0.08); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; display: none; margin-bottom: 16px;
    }
    .result-box.show { display: block; }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .result-title { font-size: 16px; font-weight: 700; color: var(--gold); }
    .result-text { font-size: 14px; line-height: 2; color: var(--text); word-break: break-word; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 30px 0; }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dots span {
      width: 10px; height: 10px; border-radius: 50%; background: var(--purple-light);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 1; }
    }
    .loading-text { font-size: 14px; color: var(--dim); }
    .cursor {
      display: inline-block; width: 2px; height: 16px;
      background: var(--purple-light); margin-left: 2px;
      animation: blink 0.8s ease-in-out infinite; vertical-align: middle;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .followup-box {
      margin-top: 16px; padding: 16px;
      background: rgba(124,58,237,0.06);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 16px;
    }
    .followup-title { font-size: 13px; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
    .followup-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px; color: white; font-size: 14px;
      font-family: 'Sarabun', sans-serif; outline: none;
      resize: none; margin-bottom: 10px; box-sizing: border-box;
    }
    .followup-input:focus { border-color: var(--purple-light); }
    .followup-input::placeholder { color: rgba(255,255,255,0.25); }
    .followup-btn {
      width: 100%; background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 12px; padding: 12px; color: var(--purple-light);
      font-size: 14px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
      transition: all 0.2s; margin-bottom: 12px;
    }
    .followup-btn:hover { background: rgba(124,58,237,0.3); }
    .followup-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .followup-result { font-size: 14px; line-height: 1.9; color: var(--text); word-break: break-word; }
    .followup-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .followup-q { color: var(--gold); font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="page-header">
  <a href="../index.html" class="back-btn">←</a>
  <div class="page-title">ซาจูเกาหลี</div>
  <div style="margin-left:auto" class="coin-badge">🪙 <span id="coinCount">500</span></div>
</div>

<div class="page-content">
  <div class="reading-hero">
    <div class="reading-icon"><img src="../images/icon-saju.png" alt="ซาจูเกาหลี"></div>
    <div class="reading-title">ซาจูเกาหลี</div>
    <div class="reading-desc">โชคชะตาแบบเกาหลีโบราณ วิเคราะห์จากวันเวลาเกิดค่ะ 🌸</div>
  </div>

  <div class="form-box">
    <div class="form-row">
      <label class="form-label">📅 วันเกิด</label>
      <input type="date" class="form-input" id="birthDate">
      <div class="form-hint">⚠️ กรอกเป็น ค.ศ. นะคะ เช่น 15/06/1995 (ไม่ใช่ พ.ศ.)</div>
    </div>
    <div class="form-row">
      <label class="form-label">🕐 เวลาเกิด (ไม่บังคับ)</label>
      <input type="time" class="form-input" id="birthTime">
      <div class="form-hint">ไม่ทราบเวลาเกิดก็ได้ค่ะ ไม่กรอกก็ไม่เป็นไร</div>
    </div>
    <div class="form-row">
      <label class="form-label">👤 เพศ</label>
      <div class="gender-row">
        <button class="gender-btn active" id="genderM" onclick="setGender('ชาย')">♂ ชาย</button>
        <button class="gender-btn" id="genderF" onclick="setGender('หญิง')">♀ หญิง</button>
      </div>
    </div>
  </div>

  <div class="coin-box">
    <div class="coin-text">🪙 ใช้ 40 เหรียญต่อครั้งค่ะ</div>
    <div class="coin-hint">เหรียญคงเหลือ: <span id="coinDisplay">500</span> เหรียญ</div>
  </div>

  <button class="btn-read" id="readBtn" onclick="startReading()">🌸 ดูซาจูเกาหลี</button>

  <div class="result-box" id="resultBox">
    <div class="result-header"><span>🌸</span><div class="result-title">ซาจูบอกว่า...</div></div>
    <div class="result-text" id="resultText"></div>
    <div class="followup-box" id="followupBox" style="display:none">
      <div class="followup-result" id="followupResult"></div>
      <div id="followupTitle" class="followup-title">💬 มีคำถามเพิ่มเติมไหมคะ?</div>
      <textarea class="followup-input" id="followupInput" rows="2" placeholder="ถามคำถามเพิ่มเติมได้เลยนะคะ"></textarea>
      <button class="followup-btn" id="followupBtn" onclick="askFollowup()">ถามต่อ 🪙 5 เหรียญ</button>
    </div>
  </div>
</div>

<script>
let selectedGender = 'ชาย';
let analysisResult = '';
let followupHistory = [];

function setGender(g) {
  selectedGender = g;
  document.getElementById('genderM').className = g === 'ชาย' ? 'gender-btn active' : 'gender-btn';
  document.getElementById('genderF').className = g === 'หญิง' ? 'gender-btn active' : 'gender-btn';
}

function colorizeSaju(text) {
  return text
    .replace(/ธาตุไฟ/g, '<span style="color:#ef4444;font-weight:700">ธาตุไฟ</span>')
    .replace(/ธาตุน้ำ/g, '<span style="color:#3b82f6;font-weight:700">ธาตุน้ำ</span>')
    .replace(/ธาตุไม้/g, '<span style="color:#10b981;font-weight:700">ธาตุไม้</span>')
    .replace(/ธาตุดิน/g, '<span style="color:#f59e0b;font-weight:700">ธาตุดิน</span>')
    .replace(/ธาตุโลหะ/g, '<span style="color:#9ca3af;font-weight:700">ธาตุโลหะ</span>')
    .replace(/화/g, '<span style="color:#ef4444;font-weight:700">화</span>')
    .replace(/수/g, '<span style="color:#3b82f6;font-weight:700">수</span>')
    .replace(/목/g, '<span style="color:#10b981;font-weight:700">목</span>')
    .replace(/토/g, '<span style="color:#f59e0b;font-weight:700">토</span>')
    .replace(/금/g, '<span style="color:#9ca3af;font-weight:700">금</span>')
    .replace(/การงาน/g, '<span style="color:#60a5fa;font-weight:700">การงาน</span>')
    .replace(/การเงิน/g, '<span style="color:#f59e0b;font-weight:700">การเงิน</span>')
    .replace(/ความรัก/g, '<span style="color:#ec4899;font-weight:700">ความรัก</span>')
    .replace(/สุขภาพ/g, '<span style="color:#10b981;font-weight:700">สุขภาพ</span>')
    .replace(/ดวงชะตา/g, '<span style="color:#818cf8;font-weight:700">ดวงชะตา</span>')
    .replace(/ปีนี้/g, '<span style="color:#a855f7;font-weight:700">ปีนี้</span>')
    .replace(/สิ่งที่ต้องระวัง/g, '<span style="color:#ef4444;font-weight:700">⚠️ สิ่งที่ต้องระวัง</span>')
    .replace(/\n/g, '<br>');
}

async function startReading() {
  const birthDate = document.getElementById('birthDate').value;
  if (!birthDate) { alert('กรุณาใส่วันเกิดก่อนค่ะ'); return; }

  const coins = parseInt(localStorage.getItem('coins') || '0');
  if (isNaN(coins) || coins < 40) {
    alert('เหรียญไม่พอค่ะ ต้องใช้ 40 เหรียญค่ะ');
    return;
  }

  const birthTime = document.getElementById('birthTime').value || 'ไม่ทราบเวลาเกิด';
  const callName = selectedGender === 'ชาย' ? 'โอปป้า' : 'ออนนี่';

  const btn = document.getElementById('readBtn');
  const resultBox = document.getElementById('resultBox');
  const resultText = document.getElementById('resultText');

  btn.disabled = true;
  btn.textContent = '⏳ กำลังวิเคราะห์...';
  resultBox.classList.add('show');
  resultText.innerHTML = `
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">กำลังวิเคราะห์ซาจู กรุณารอสักครู่...</div>
    </div>`;
  setTimeout(() => resultBox.scrollIntoView({ behavior: 'smooth' }), 100);

  const currentYear = new Date().getFullYear();
const prompt = `วิเคราะห์ซาจูเกาหลี (사주팔자) จากข้อมูลต่อไปนี้
วันเกิด (ค.ศ.): ${birthDate}
เวลาเกิด: ${birthTime}
ปีปัจจุบัน (ค.ศ.): ${currentYear}
เพศ: ${selectedGender}

เริ่มด้วยทักทายว่า "อันยองฮาเซโย ${callName}~" แบบ Gen Z อบอุ่น จากนั้นแบ่งเป็นหัวข้อ:
ธาตุประจำตัว (บอกชื่อธาตุ ความหมาย จุดแข็ง จุดอ่อน)
ดวงชะตาโดยรวม (ภาพรวมชีวิต บุคลิก นิสัย)
การงานและความสำเร็จ (เส้นทางอาชีพที่เหมาะสม โอกาส)
การเงินและทรัพย์สิน (ดวงเงิน วิธีสร้างความมั่งคั่ง)
ความรักและชีวิตคู่ (ลักษณะคู่ที่เหมาะ ดวงความรัก)
สุขภาพ (สิ่งที่ต้องดูแล อวัยวะที่ควรระวัง)
ปีนี้ดวงเป็นยังไง (ภาพรวมปีนี้ โอกาส ระวัง)
สิ่งที่ต้องระวัง (คำเตือนจากดวง)
สรุปและคำแนะนำ (ข้อคิดปิดท้าย)
เรียก${selectedGender === 'ชาย' ? 'ว่าโอปป้า' : 'ว่าออนนี่'}ตลอด เรียกตัวเองว่า "น้อง" ห้ามพูดว่าหัวข้อที่ 1 2 3 ห้ามใช้ markdown ห้ามใช้เลขไทย เขียนให้จบสมบูรณ์`;

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 6000,
        system: `คุณคือผู้เชี่ยวชาญซาจูเกาหลี (사주팔자) พูดแบบ Gen Z อบอุ่น เป็นกันเอง สไตล์เกาหลี ทักทายด้วย "อันยองฮาเซโย" เรียกผู้ชายว่า "โอปป้า" เรียกผู้หญิงว่า "ออนนี่" เรียกตัวเองว่า "น้อง" แบ่งเป็นหัวข้อชัดเจน ห้ามใช้ markdown ห้ามใช้เลขไทย เขียนให้จบสมบูรณ์`,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    resultText.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    resultText.appendChild(cursor);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      text += decoder.decode(value);
      resultText.innerHTML = colorizeSaju(text);
      resultText.appendChild(cursor);
    }
    cursor.remove();
    resultText.innerHTML = colorizeSaju(text);
    analysisResult = text;

    const newCoins = coins - 40;
    localStorage.setItem('coins', String(newCoins));
    document.getElementById('coinCount').textContent = newCoins;
    document.getElementById('coinDisplay').textContent = newCoins;

    followupHistory = [];
    document.getElementById('followupBox').style.display = 'block';

  } catch(e) {
    console.error('startReading error:', e);
    resultText.textContent = `เกิดข้อผิดพลาดค่ะ: ${e.message}`;
  }

  btn.disabled = false;
  btn.textContent = '🌸 ดูซาจูอีกครั้ง';
}

async function askFollowup() {
  const input = document.getElementById('followupInput');
  const question = input.value.trim();
  if (!question) { alert('กรุณาพิมพ์คำถามก่อนค่ะ'); return; }

  const coins = parseInt(localStorage.getItem('coins') || '0');
  if (isNaN(coins) || coins < 5) { alert('เหรียญไม่พอค่ะ ต้องใช้ 5 เหรียญค่ะ'); return; }

  const callName = selectedGender === 'ชาย' ? 'โอปป้า' : 'ออนนี่';
  const followupBtn = document.getElementById('followupBtn');
  const resultDiv = document.getElementById('followupResult');

  followupBtn.disabled = true;
  document.getElementById('followupInput').style.display = 'none';
  document.getElementById('followupBtn').style.display = 'none';
  document.getElementById('followupTitle').style.display = 'none';

  const time = Date.now();
  resultDiv.innerHTML += `<hr class="followup-divider"><div class="followup-q">❓ ${question}</div><div id="ans_${time}"></div>`;
  const answerDiv = document.getElementById(`ans_${time}`);

  try {
    const res = await fetch('/api/claude', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 600,
        system: `คุณคือผู้เชี่ยวชาญซาจูเกาหลี Gen Z เรียก${selectedGender === 'ชาย' ? 'ผู้ใช้ว่าโอปป้า' : 'ผู้ใช้ว่าออนนี่'} เรียกตัวเองว่า "น้อง" ตอบจากผลวิเคราะห์เดิม สั้นๆ 3-5 บรรทัด ตรงประเด็น ห้ามใช้ markdown ห้ามใช้เลขไทย`,
        messages: [{ role: 'user', content: `ผลวิเคราะห์ซาจู: ${analysisResult}\nคำถาม: ${question}` }]
      })
    });

    if (!res.ok) throw new Error('API error');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    answerDiv.appendChild(cursor);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      text += decoder.decode(value);
      answerDiv.textContent = text;
      answerDiv.appendChild(cursor);
    }
    cursor.remove();
    answerDiv.textContent = text;
    followupHistory.push({ role: 'user', content: question }, { role: 'assistant', content: text });

    const newCoins = coins - 5;
    localStorage.setItem('coins', String(newCoins));
    document.getElementById('coinCount').textContent = newCoins;

  } catch(e) {
    answerDiv.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่ค่ะ';
  }

  input.value = '';
  document.getElementById('followupInput').style.display = 'block';
  document.getElementById('followupBtn').style.display = 'block';
  document.getElementById('followupTitle').style.display = 'block';
  followupBtn.disabled = false;
  answerDiv.scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', () => {
  const coins = parseInt(localStorage.getItem('coins') || '500');
  const c = isNaN(coins) ? 500 : coins;
  document.getElementById('coinCount').textContent = c;
  document.getElementById('coinDisplay').textContent = c;
});
</script>
</body>
</html>
