<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ — My Tarot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-bottom: 80px; }
    .page-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,8,32,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .page-title { font-size: 18px; font-weight: 700; color: white; }
    .page-content { padding: 20px 20px 40px; }

    /* Guest */
    .guest-section { text-align: center; padding: 40px 20px; }
    .guest-icon { font-size: 64px; margin-bottom: 16px; }
    .guest-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 8px; }
    .guest-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 28px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; border-radius: 16px;
      background: white; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; color: #333;
      font-family: 'Sarabun', sans-serif; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .btn-google img { width: 20px; height: 20px; }

    /* Logged in */
    .profile-section { display: none; }

    /* Avatar selector */
    .avatar-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 16px; text-align: center;
    }
    .avatar-display {
      width: 90px; height: 90px; border-radius: 50%;
      margin: 0 auto 16px; border: 3px solid rgba(124,58,237,0.4);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-size: 48px; background: rgba(124,58,237,0.1);
    }
    .avatar-display img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 800; color: white; margin-bottom: 4px; }
    .profile-email { font-size: 13px; color: var(--dim); margin-bottom: 16px; }

    .avatar-grid { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
    .avatar-opt {
      width: 52px; height: 52px; border-radius: 50%;
      font-size: 28px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid transparent;
      background: rgba(255,255,255,0.05); transition: all 0.2s;
    }
    .avatar-opt:hover { transform: scale(1.1); }
    .avatar-opt.active { border-color: var(--purple-light); background: rgba(124,58,237,0.2); }
    .avatar-label { font-size: 11px; color: var(--dim); margin-top: 4px; }

    /* Coins */
    .coins-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 16px;
    }
    .coins-icon { font-size: 40px; }
    .coins-info { flex: 1; }
    .coins-label { font-size: 12px; color: var(--gold); margin-bottom: 4px; }
    .coins-amount { font-size: 28px; font-weight: 800; color: white; }
    .btn-coins {
      padding: 10px 16px; border-radius: 12px;
      background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.4);
      color: var(--gold); font-size: 13px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
    }

    /* Premium */
    .premium-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.08));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 16px;
    }
    .premium-icon { font-size: 36px; }
    .premium-info { flex: 1; }
    .premium-label { font-size: 12px; color: var(--purple-light); margin-bottom: 4px; }
    .premium-status { font-size: 16px; font-weight: 700; color: white; }
    .btn-premium {
      padding: 10px 16px; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none; color: white; font-size: 13px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
    }

    /* Menu */
    .menu-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden; margin-bottom: 16px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: rgba(255,255,255,0.03); }
    .menu-item-icon { font-size: 20px; width: 28px; text-align: center; }
    .menu-item-text { flex: 1; font-size: 14px; color: white; font-weight: 600; }
    .menu-item-arrow { color: var(--dim); font-size: 16px; }
    .menu-item.danger .menu-item-text { color: #ef4444; }

    .btn-logout {
      width: 100%; padding: 14px; border-radius: 16px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444; font-size: 15px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,8,32,0.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; padding: 8px 0 12px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; cursor: pointer;
      color: var(--dim); font-size: 10px; transition: color 0.2s;
    }
    .nav-item span:first-child { font-size: 20px; }
    .nav-item.active { color: var(--purple-light); }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBMQEsuykNPvV7CsnB36zzmN-wribcd7YM",
      authDomain: "my-tarot67.firebaseapp.com",
      projectId: "my-tarot67",
      storageBucket: "my-tarot67.firebasestorage.app",
      messagingSenderId: "33661162829",
      appId: "1:33661162829:web:9e06a7cd5a00d613785304"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const AVATARS = ['🔮','🌙','⭐','🌸','🐉','🦋','🌺','🎭','🌊','⚡','🌙','🦄'];

    function getSavedAvatar() {
      return localStorage.getItem('userAvatar') || '🔮';
    }

    function renderAvatarGrid(current) {
      return AVATARS.map(a => `
        <div class="avatar-opt ${a === current ? 'active' : ''}" onclick="selectAvatar('${a}')">${a}</div>
      `).join('');
    }

    window.selectAvatar = function(avatar) {
      localStorage.setItem('userAvatar', avatar);
      document.getElementById('avatarDisplay').textContent = avatar;
      document.querySelectorAll('.avatar-opt').forEach(el => {
        el.classList.toggle('active', el.textContent === avatar);
      });
    };

    window.loginGoogle = async function() {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) {
        alert('เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่');
      }
    };

    window.logoutUser = async function() {
      if (!confirm('ออกจากระบบใช่ไหม?')) return;
      await signOut(auth);
    };

    onAuthStateChanged(auth, user => {
      const guestSection = document.getElementById('guestSection');
      const profileSection = document.getElementById('profileSection');

      if (user) {
        guestSection.style.display = 'none';
        profileSection.style.display = 'block';

        const avatar = getSavedAvatar();
        document.getElementById('avatarDisplay').textContent = avatar;
        document.getElementById('profileName').textContent = user.displayName || 'ผู้ใช้';
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('avatarGrid').innerHTML = renderAvatarGrid(avatar);
        document.getElementById('coinAmount').textContent = parseInt(localStorage.getItem('coins') || '0');

        // sync user to localStorage
        localStorage.setItem('userId', user.uid);
        localStorage.setItem('userName', user.displayName || '');
        localStorage.setItem('userEmail', user.email || '');

      } else {
        guestSection.style.display = 'block';
        profileSection.style.display = 'none';
        localStorage.removeItem('userId');
      }
    });
  </script>
</head>
<body>

<div class="page-header">
  <div class="page-title">👤 โปรไฟล์</div>
  <div style="margin-left:auto" class="coin-badge">🪙 <span id="coinCount">0</span></div>
</div>

<div class="page-content">

  <!-- Guest -->
  <div id="guestSection" class="guest-section">
    <div class="guest-icon">🔮</div>
    <div class="guest-title">เข้าสู่ระบบ</div>
    <div class="guest-desc">เข้าสู่ระบบเพื่อบันทึกประวัติดูดวง<br>และเหรียญของคุณอย่างปลอดภัย</div>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.google.com/favicon.ico">
      เข้าสู่ระบบด้วย Google
    </button>
  </div>

  <!-- Logged in -->
  <div id="profileSection" class="profile-section">

    <!-- Avatar & Name -->
    <div class="avatar-card">
      <div class="avatar-display">
        <span id="avatarDisplay">🔮</span>
      </div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-email" id="profileEmail"></div>
      <div class="avatar-label">เลือก avatar ของคุณ</div>
      <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <!-- Coins -->
    <div class="coins-card">
      <div class="coins-icon">🪙</div>
      <div class="coins-info">
        <div class="coins-label">เหรียญคงเหลือ</div>
        <div class="coins-amount" id="coinAmount">0</div>
      </div>
      <button class="btn-coins" onclick="alert('เร็วๆ นี้ค่ะ!')">ซื้อเพิ่ม</button>
    </div>

    <!-- Premium -->
    <div class="premium-card">
      <div class="premium-icon">👑</div>
      <div class="premium-info">
        <div class="premium-label">แพ็กเกจปัจจุบัน</div>
        <div class="premium-status">🆓 แพ็กเกจฟรี</div>
      </div>
      <button class="btn-premium" onclick="alert('เร็วๆ นี้ค่ะ!')">อัปเกรด</button>
    </div>

    <!-- Menu -->
    <div class="menu-card">
      <div class="menu-item" onclick="window.location.href='history.html'">
        <div class="menu-item-icon">📜</div>
        <div class="menu-item-text">ประวัติดูดวง</div>
        <div class="menu-item-arrow">›</div>
      </div>
      <div class="menu-item" onclick="alert('เร็วๆ นี้ค่ะ!')">
        <div class="menu-item-icon">🔔</div>
        <div class="menu-item-text">การแจ้งเตือน</div>
        <div class="menu-item-arrow">›</div>
      </div>
      <div class="menu-item" onclick="alert('เร็วๆ นี้ค่ะ!')">
        <div class="menu-item-icon">❓</div>
        <div class="menu-item-text">ช่วยเหลือ</div>
        <div class="menu-item-arrow">›</div>
      </div>
    </div>

    <button class="btn-logout" onclick="logoutUser()">🚪 ออกจากระบบ</button>

  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='../index.html'"><span>🔮</span><span>ดูดวง</span></div>
  <div class="nav-item" onclick="window.location.href='history.html'"><span>📜</span><span>ประวัติ</span></div>
  <div class="nav-item" onclick="window.location.href='coins.html'"><span>🪙</span><span>เหรียญ</span></div>
  <div class="nav-item active"><span>👤</span><span>โปรไฟล์</span></div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('coinCount').textContent = parseInt(localStorage.getItem('coins') || '0');
});
</script>
</body>
</html>
