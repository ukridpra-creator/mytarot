<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทดสอบ Prokerala API</title>
</head>
<body style="background:#000;color:#fff;padding:20px;font-family:monospace;">
  <h2>ทดสอบ Prokerala API</h2>
  <button onclick="test()" style="padding:10px 20px;margin-bottom:20px;">ทดสอบ</button>
  <pre id="result">กด ทดสอบ ก่อน...</pre>

  <script>
  async function test() {
    document.getElementById('result').textContent = 'กำลังเรียก API...';
    try {
      const res = await fetch('/api/prokerala', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          birthDate: '1986-09-25',
          birthTime: '10:37',
          lat: '13.7563',
          lon: '100.5018'
        })
      });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    } catch(e) {
      document.getElementById('result').textContent = 'Error: ' + e.message;
    }
  }
  </script>
</body>
</html>
