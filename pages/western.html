<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>ทดสอบ FreeAstroAPI</title></head>
<body style="background:#000;color:#fff;padding:20px;font-family:monospace;">
  <h2>ทดสอบ FreeAstroAPI</h2>
  <button onclick="test()" style="padding:10px 20px;margin-bottom:20px;">ทดสอบ</button>
  <pre id="result">กด ทดสอบ ก่อน...</pre>
  <script>
  async function test() {
    document.getElementById('result').textContent = 'กำลังเรียก API...';
    try {
      const res = await fetch('/api/freeastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          year: 1986, month: 9, day: 25,
          hour: 10, minute: 37,
          lat: 13.7563, lng: 100.5018,
          tz_str: 'Asia/Bangkok'
        })
      });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    } catch(e) {
      document.getElementById('result').textContent = 'Error: ' + e.message;
    }
  }
  </script>
</body>
</html>
