<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฮัน ออราเคิล | MyTarot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;500&family=Playfair+Display:ital,wght@1,400&display=swap');

  :root {
    --lavender: #e8dff0;
    --lavender-mid: #c9b8e0;
    --lavender-deep: #9b7dc0;
    --blush: #f2c4ce;
    --blush-mid: #e8a0b0;
    --cream: #fdf8f2;
    --gold: #c9a84c;
    --gold-light: #e8cc80;
    --ink: #2d2438;
    --ink-light: #5a4e6e;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #f0e8f8 0%, #e8dff0 40%, #f5e8f0 100%);
    min-height: 100vh;
    font-family: 'Noto Sans Thai', sans-serif;
    color: var(--ink);
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    padding: 32px 20px 16px;
  }

  .mascot-wrap {
    width: 110px;
    height: 110px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--lavender-mid), var(--blush));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(155,125,192,0.25);
    overflow: hidden;
  }

  .mascot-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .mascot-placeholder {
    font-size: 48px;
  }

  .title-ko {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--lavender-deep);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .title-th {
    font-family: 'Noto Serif Thai', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
  }

  /* ─── COIN ─── */
  .coin-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 12px 0;
    font-size: 14px;
    color: var(--ink-light);
  }

  .coin-count {
    font-weight: 600;
    color: var(--gold);
    font-size: 16px;
  }

  /* ─── MODE TABS ─── */
  .mode-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 0 16px;
    margin: 16px 0;
  }

  .tab-btn {
    flex: 1;
    max-width: 110px;
    padding: 10px 6px;
    border: 1.5px solid var(--lavender-mid);
    border-radius: 16px;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Noto Sans Thai', sans-serif;
  }

  .tab-btn .tab-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .tab-btn .tab-name { font-size: 12px; font-weight: 500; color: var(--ink); display: block; }
  .tab-btn .tab-cost { font-size: 11px; color: var(--gold); display: block; margin-top: 2px; }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--lavender-deep), var(--blush-mid));
    border-color: transparent;
    box-shadow: 0 4px 14px rgba(155,125,192,0.35);
  }

  .tab-btn.active .tab-name,
  .tab-btn.active .tab-cost { color: white; }

  /* ─── MODE DESC ─── */
  .mode-desc {
    text-align: center;
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 16px;
    min-height: 18px;
    padding: 0 20px;
  }

  /* ─── QUESTION INPUT ─── */
  .question-wrap {
    padding: 0 20px;
    margin-bottom: 16px;
  }

  .question-wrap textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--lavender-mid);
    border-radius: 16px;
    background: rgba(255,255,255,0.75);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .question-wrap textarea:focus {
    border-color: var(--lavender-deep);
  }

  .question-wrap textarea::placeholder { color: #b0a0c0; }

  /* ─── DRAW BUTTON ─── */
  .draw-btn-wrap { padding: 0 20px; margin-bottom: 24px; }

  .draw-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--lavender-deep), var(--blush-mid));
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Noto Serif Thai', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(155,125,192,0.4);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .draw-btn:active { transform: scale(0.97); }
  .draw-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── CARDS AREA ─── */
  .cards-area {
    padding: 0 20px;
    margin-bottom: 20px;
  }

  /* Layout 1 card */
  .cards-layout-1 {
    display: flex;
    justify-content: center;
  }

  /* Layout 3 cards */
  .cards-layout-3 {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* Layout 5 cards - cross */
  .cards-layout-5 {
    display: grid;
    grid-template-areas:
      ". top ."
      "left mid right"
      ". bot .";
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 320px;
    margin: 0 auto;
  }

  .card-slot { position: relative; }
  .card-slot.pos-top    { grid-area: top; }
  .card-slot.pos-left   { grid-area: left; }
  .card-slot.pos-mid    { grid-area: mid; }
  .card-slot.pos-right  { grid-area: right; }
  .card-slot.pos-bot    { grid-area: bot; }

  /* Card flip */
  .card-flip {
    perspective: 600px;
    width: 90px;
    height: 130px;
    margin: 0 auto;
    cursor: pointer;
  }

  .cards-layout-1 .card-flip { width: 120px; height: 170px; }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(155,125,192,0.25);
  }

  .card-back {
    background: linear-gradient(135deg, var(--lavender-deep) 0%, #6b4c9a 50%, var(--blush-mid) 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 4px;
  }

  .card-back img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .card-back-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    gap: 4px;
  }

  .card-back-placeholder .ko-pattern {
    font-size: 28px;
    opacity: 0.6;
    color: white;
  }

  .card-back-border {
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
  }

  .card-front {
    transform: rotateY(180deg);
    background: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 6px;
    border: 1.5px solid var(--gold-light);
  }

  .card-front .card-emoji { font-size: 26px; margin-bottom: 4px; }
  .cards-layout-1 .card-front .card-emoji { font-size: 36px; }

  .card-front .card-name {
    font-family: 'Noto Serif Thai', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    line-height: 1.4;
  }

  .cards-layout-1 .card-front .card-name { font-size: 13px; }

  .card-front .card-pos-label {
    font-size: 9px;
    color: var(--lavender-deep);
    margin-top: 4px;
    font-weight: 500;
  }

  .card-front .card-gold-line {
    width: 30px; height: 1px;
    background: var(--gold-light);
    margin: 4px 0;
  }

  /* ─── READING RESULT ─── */
  .reading-wrap {
    margin: 0 20px 32px;
    background: rgba(255,255,255,0.75);
    border-radius: 20px;
    padding: 20px 18px;
    border: 1px solid var(--lavender-mid);
    box-shadow: 0 4px 20px rgba(155,125,192,0.12);
    display: none;
  }

  .reading-wrap.show { display: block; }

  .reading-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--lavender);
  }

  .reading-header .lotus { font-size: 20px; }

  .reading-header h3 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--lavender-deep);
  }

  .reading-text {
    font-size: 14px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
    font-family: 'Noto Sans Thai', sans-serif;
    font-weight: 300;
  }

  .reading-loading {
    text-align: center;
    padding: 20px;
    color: var(--lavender-deep);
    font-size: 14px;
  }

  .dots span {
    animation: blink 1.2s infinite;
    display: inline-block;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ─── LOGIN MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,36,56,0.6);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal-box {
    background: white;
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    width: 85%;
    max-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }

  .modal-box h3 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .modal-box p {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .btn-google {
    width: 100%;
    padding: 12px;
    background: white;
    border: 1.5px solid #e0d0f0;
    border-radius: 50px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .btn-close-modal {
    margin-top: 12px;
    background: none;
    border: none;
    color: var(--ink-light);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans Thai', sans-serif;
  }

  /* ─── PETAL ANIMATION ─── */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    font-size: 16px;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="mascot-wrap">
    <img src="images/han-mascot.png" alt="Han Oracle mascot"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">

  <div class="coin-bar">

</div>

<!-- MODE TABS -->
<div class="mode-tabs">

  </button>
  <button class="tab-btn" onclick="selectMode(3)">
    <span class="tab-icon">🌸🌸</span>
    <span class="tab-name">3 ใบ</span>
    <span class="tab-cost">20 🪙</span>
  </button>
  <button class="tab-btn" onclick="selectMode(5)">
    <span class="tab-icon">🌸🌸🌸</span>
    <span class="tab-name">5 ใบ</span>
    <span class="tab-cost">30 🪙</span>
  </button>
</div>

<div class="mode-desc" id="modeDesc">ข้อความจากจักรวาลสำหรับวันนี้</div>

<!-- QUESTION -->
<div class="question-wrap">
  <textarea id="questionInput" rows="3"
    placeholder="พิมพ์คำถามของคุณพี่... หรือเปิดรับพลังงานโดยไม่ต้องถาม 🌸"></textarea>
</div>

<!-- DRAW BUTTON -->
<div class="draw-btn-wrap">
  <button class="draw-btn" id="drawBtn" onclick="drawCards()">
    🎴 หยิบไพ่
  </button>
</div>

<!-- CARDS AREA -->
<div class="cards-area" id="cardsArea"></div>

<!-- READING -->
<div class="reading-wrap" id="readingWrap">
  <div class="reading-header">
    <span class="lotus">🪷</span>
    <h3>คำทำนายจากจิตวิญญาณเกาหลี</h3>
  </div>
  <div class="reading-text" id="readingText"></div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <h3>🌸 เข้าสู่ระบบก่อนนะคะ</h3>
    <p>ต้องล็อกอินเพื่อหยิบไพ่<br>และบันทึกผลการทำนาย</p>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.google.com/favicon.ico" width="18"> เข้าสู่ระบบด้วย Google
    </button>
    <button class="btn-close-modal" onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

  { name: "นกกระเรียน (ดูรูมี)", emoji: "🦢", kw: "อายุยืน สติปัญญา ความสูงส่ง" },
  { name: "เสือขาว (แบกโฮ)", emoji: "🐯", kw: "ความกล้า พลังปกป้อง ผู้พิทักษ์" },
  { name: "กวางทอง", emoji: "🦌", kw: "ความอุดมสมบูรณ์ พรจากฟ้า" },
  { name: "ปลาคาร์ปแดง", emoji: "🐟", kw: "ความพยายามสู่ความสำเร็จ ไม่ยอมแพ้" },
  { name: "นกฟีนิกซ์โบ (บงฮวัง)", emoji: "🦅", kw: "การเกิดใหม่ ราชินีแห่งจิตใจ" },
  { name: "กระต่ายบนดวงจันทร์ (ดัลโทกิ)", emoji: "🐰", kw: "เวทมนตร์อ่อนโยน ความซื่อสัตย์" },
  { name: "ผีเสื้อคู่", emoji: "🦋", kw: "ความรัก การแปลงเปลี่ยนตัวเอง" },
  { name: "มังกรน้ำ (อีมูกิ)", emoji: "🐉", kw: "กำลังเติบโต ยังไม่ถึงเวลาแต่ใกล้แล้ว" },
  { name: "นกฮูกขาว", emoji: "🦉", kw: "ปัญญาในความมืด คำตอบซ่อนอยู่ภายใน" }
];

var posLabels1 = ["ข้อความวันนี้"];
var posLabels3 = ["อดีต", "ปัจจุบัน", "อนาคต"];
var posLabels5 = ["จิตใจลึกๆ", "อดีต", "แก่นแท้", "อนาคต", "คำแนะนำ"];

var currentMode = 1;
var drawnCards = [];

// ─── AUTH ───
onAuthStateChanged(auth, async function(user) {
  currentUser = user;
  if (user) {
    var snap = await getDoc(doc(db, "users", user.uid));
    var coins = snap.exists() ? (snap.data().coins || 0) : 0;
    updateCoinUI(coins);
  } else {
    updateCoinUI(null);
  }
});

window.updateCoinUI = function(coins) {
  var el = document.getElementById("coinCount");
  if (coins === null || coins === undefined) {
    el.textContent = "ล็อกอินก่อนนะคะ";
    el.style.color = "#b0a0c0";
  } else {
    el.textContent = coins;
    el.style.color = "var(--gold)";
  }
};

window.loginGoogle = async function() {
  var provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); closeModal(); } catch(e) {}
};

window.loginNow = function() {
  document.getElementById("loginModal").classList.add("show");
};

window.closeModal = function() {
  document.getElementById("loginModal").classList.remove("show");
};

// ─── MODE ───
window.selectMode = function(n) {
  currentMode = n;
  var tabs = document.querySelectorAll(".tab-btn");
  tabs.forEach(function(t, i) {
    t.classList.toggle("active", [1,3,5][i] === n);
  });
  var descs = {
    1: "ข้อความจากจักรวาลสำหรับวันนี้",
    3: "อดีต • ปัจจุบัน • อนาคต",
    5: "ฮันบกจิตใจ — 5 มิติแห่งตัวตน"
  };
  document.getElementById("modeDesc").textContent = descs[n];
  document.getElementById("cardsArea").innerHTML = "";
  document.getElementById("readingWrap").classList.remove("show");
  drawnCards = [];
};

// ─── DRAW ───
window.drawCards = async function() {
  if (!currentUser) { loginNow(); return; }

  var question = document.getElementById("questionInput").value.trim();
  drawnCards = [];

  // สุ่มไพ่ไม่ซ้ำ
  var shuffled = allCards.slice().sort(function() { return Math.random() - 0.5; });
  drawnCards = shuffled.slice(0, currentMode);

  // render cards (ปิดก่อน)
  renderCards(false);

  // เปิดไพ่ทีละใบ
  var btn = document.getElementById("drawBtn");
  btn.disabled = true;

  for (var i = 0; i < drawnCards.length; i++) {
    await sleep(400 + i * 300);
    var inner = document.getElementById("cardInner_" + i);
    if (inner) inner.classList.add("flipped");
  }

  // petals
  spawnPetals();

  // call API
  await callReading(question);
  btn.disabled = false;
};

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function renderCards(flipped) {
  var area = document.getElementById("cardsArea");
  var posLabels = currentMode === 1 ? posLabels1 : currentMode === 3 ? posLabels3 : posLabels5;

  if (currentMode === 1) {
    area.innerHTML = '<div class="cards-layout-1">' + cardHTML(0, posLabels[0], flipped) + '</div>';
  } else if (currentMode === 3) {
    var html = '<div class="cards-layout-3">';
    for (var i = 0; i < 3; i++) html += cardHTML(i, posLabels[i], flipped);
    html += '</div>';
    area.innerHTML = html;
  } else {
    // 5 cards cross — order: top(0), left(1), mid(2), right(3), bot(4)
    var posClass = ["pos-top", "pos-left", "pos-mid", "pos-right", "pos-bot"];
    var html = '<div class="cards-layout-5">';
    for (var i = 0; i < 5; i++) {
      html += '<div class="card-slot ' + posClass[i] + '">' + cardHTML(i, posLabels[i], flipped) + '</div>';
    }
    html += '</div>';
    area.innerHTML = html;
  }
}

function cardHTML(idx, label, flipped) {
  var card = drawnCards[idx];
  var flipClass = flipped ? " flipped" : "";
  return '<div class="card-flip">' +
    '<div class="card-inner' + flipClass + '" id="cardInner_' + idx + '">' +
      '<div class="card-face card-back">' +
        '<img src="images/han-card-back.png" alt="card back" ' +
          'onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="card-back-placeholder" style="display:none">' +
          '<div class="ko-pattern">韓</div>' +
          '<div class="card-back-border"></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-face card-front">' +
        '<div class="card-emoji">' + card.emoji + '</div>' +
        '<div class="card-gold-line"></div>' +
        '<div class="card-name">' + card.name + '</div>' +
        '<div class="card-pos-label">' + label + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ─── API CALL ───
async function callReading(question) {
  var wrap = document.getElementById("readingWrap");
  var textEl = document.getElementById("readingText");
  wrap.classList.add("show");
  textEl.innerHTML = '<div class="reading-loading">🌸 กำลังอ่านพลังงาน <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>';

  var serviceMap = { 1: "han-oracle-1", 3: "han-oracle-3", 5: "han-oracle-5" };
  var service = serviceMap[currentMode];

  var posLabels = currentMode === 1 ? posLabels1 : currentMode === 3 ? posLabels3 : posLabels5;
  var cardList = drawnCards.map(function(c, i) {
    return "ตำแหน่ง "" + posLabels[i] + "": " + c.name + " (" + c.kw + ")";
  }).join("\n");

  var promptText = "คุณคือหมอดูไพ่ออราเคิลเกาหลีโบราณ อบอุ่น เยียวยา พูดจาอ่อนโยนเหมือนพี่สาวที่เข้าใจหัวใจ\n" +
    "เรียกผู้ถามว่า 'คุณพี่' ใช้ภาษาไทยสวยงามแต่อ่านง่าย\n\n" +
    "ไพ่ที่จั่วได้:\n" + cardList + "\n\n" +
    (question ? "คำถาม: " + question + "\n\n" : "ไม่มีคำถามเฉพาะ ขอรับพลังงานโดยรวม\n\n") +
    "กรุณาทำนายโดยแบ่งเป็น:\n" +
    "🌸 ความหมายของไพ่แต่ละใบ\n" +
    "🌿 การตีความรวมกัน\n" +
    "🪷 คำแนะนำและข้อความจากจิตวิญญาณเกาหลี\n\n" +
    "ใช้ความหมายของไพ่เป็นแกนหลัก ขยายความให้ลึกและเยียวยาจิตใจ";

  try {
    var idToken = await currentUser.getIdToken();

    var res = await fetch("/api/claude", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + idToken
      },
      body: JSON.stringify({
        service: service,
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: promptText }]
      })
    });

    var newCoins = res.headers.get("X-New-Coin-Balance");
    if (newCoins !== null) updateCoinUI(parseInt(newCoins));

    if (!res.ok) {
      var err = await res.json();
      if (err.error === "insufficient_coins") {
        textEl.textContent = "เหรียญไม่พอนะคะ 🪙 กรุณาเติมเหรียญก่อนเลยค่ะ";
      } else {
        textEl.textContent = "เกิดข้อผิดพลาด ลองใหม่นะคะ 🙏";
      }
      return;
    }

    // อ่านแบบ stream
    textEl.textContent = "";
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var fullText = "";

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      var text = decoder.decode(chunk.value, { stream: true });
      fullText += text;
      textEl.textContent = fullText;
    }

    // save to firestore
    await addDoc(collection(db, "users", currentUser.uid, "readings"), {
      type: "han-oracle",
      mode: currentMode,
      cards: drawnCards.map(function(c) { return c.name; }),
      question: question,
      reading: fullText,
      createdAt: serverTimestamp()
    });

  } catch(e) {
    textEl.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่นะคะ 🙏";
    console.error(e);
  }
}

// ─── PETALS ───
function spawnPetals() {
  for (var i = 0; i < 12; i++) {
    (function(i) {
      setTimeout(function() {
        var p = document.createElement("div");
        p.className = "petal";
        p.textContent = ["🌸","🌷","🌺"][Math.floor(Math.random()*3)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (2 + Math.random() * 2) + "s";
        p.style.animationDelay = "0s";
        document.body.appendChild(p);
        setTimeout(function() { p.remove(); }, 4500);
      }, i * 150);
    })(i);
  }
}

// expose for HTML onclick
window.drawCards = drawCards;
window.selectMode = selectMode;

</script>
</body>
</html>
